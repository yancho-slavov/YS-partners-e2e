name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      QA_EMAIL: ${{ secrets.QA_EMAIL }}
      QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Chromium only for now - the primary/required target for this
      # submission. To extend to firefox/webkit later (stretch goal), also
      # define those projects in playwright.config.ts, then change this to:
      #   run: npx playwright install --with-deps chromium firefox webkit
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces and test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
